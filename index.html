<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KC Khan | Portfolio</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #0f172a;
            color: #f8fafc;
            text-align: center;
            padding: 50px;
        }
        h1 { color: #fd72b6; }
        p { font-size: 18px; color: #cbd5e1; }
        .badge {
            background-color: #1e293b;
            padding: 10px 20px;
            border-radius: 20px;
            display: inline-block;
            margin-top: 20px;
            border: 1px solid #fd72b6;
        }

        /* --- New Product Card CSS --- */
        .product-card {
            width: 280px;
            background-color: #ffffff;
            border-radius: 15px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
            overflow: hidden;
            margin: 40px auto;
            transition: transform 0.3s ease;
        }
        .product-card:hover {
            transform: translateY(-5px);
        }
        .product-img {
            width: 100%;
            height: 250px;
            object-fit: cover;
        }
        .product-info {
            padding: 20px;
            text-align: center;
        }
        .product-title {
            font-size: 18px;
            color: #333333;
            margin: 0 0 10px 0;
            font-weight: 600;
        }
        .product-price {
            font-size: 16px;
            color: #666666;
            margin: 0 0 15px 0;
        }
        .buy-btn {
            width: 100%;
            padding: 12px;
            background-color: #222222;
            color: #ffffff;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: background-color 0.3s ease;
        }
        .buy-btn:hover {
            background-color: #555555;
        }
    </style>
</head>
<body>

    <h1>Hello World! I'm KC Khan 👋</h1>
    <p>Welcome to my first live webpage hosted on GitHub Pages!</p>
    <div class="badge">Computer Science Student | Web Developer</div>

    <!-- --- New Product Card HTML --- -->
    <div class="product-card">
        <img src="https://images.unsplash.com/photo-1607006342456-ba275cd34284?w=500" alt="Product Image" class="product-img">
        <div class="product-info">
            <h3 class="product-title">Aesthetic Coconut Bar Soap</h3>
            <p class="product-price">£15.00</p>
            <button class="buy-btn">Buy Now</button>
        </div>
    </div>

</body>
</html>
